name: Deploy Supabase backend

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nexushos-supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.SUPABASE_PROJECT_REF != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate deployment credentials
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
      - run: supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
      - run: supabase db push --linked
      - run: supabase functions deploy nexushos-api --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" --no-verify-jwt
